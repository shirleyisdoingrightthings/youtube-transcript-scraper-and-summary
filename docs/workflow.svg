<svg width="680" viewBox="0 0 680 668" role="img" xmlns="http://www.w3.org/2000/svg">
<title>YouTube 转 Blog 工作流设计视图</title>
<desc>从收到 YouTube 链接到系统自进化的流水线。左侧为流程步骤，按角色着色：灰=输入/归档/日志，紫=生成，青=质量闸门，琥珀=系统进化；右侧灰块为每一步对应的工程模块或文件。</desc>
<defs>
<style>
text{font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#2C2C2A}
.th{font-size:14px;font-weight:500}
.ts{font-size:12px;font-weight:400;fill:#56554F}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:1.5}
.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:1.5}
.c-purple .th{fill:#26215C}.c-purple .ts{fill:#534AB7}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:1.5}
.c-teal .th{fill:#04342C}.c-teal .ts{fill:#0F6E56}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:1.5}
.c-amber .th{fill:#412402}.c-amber .ts{fill:#854F0B}
.box{fill:#FBFBFA;stroke:#B4B2A9;stroke-width:1}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.leader{stroke:#B4B2A9;stroke-width:0.8;stroke-dasharray:3 3}
</style>
<marker id="ah" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#888780" stroke-width="1.2"/></marker>
</defs>
<rect x="0" y="0" width="680" height="668" fill="#FFFFFF"/>

